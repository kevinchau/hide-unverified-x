<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hide Unverified X</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Hide Unverified X</h1>
        <p>Choose where to hide posts without a blue check.</p>
      </header>

      <section class="toggle-group" aria-label="Filter settings">
        <label class="toggle" for="forYou">
          <span class="toggle-copy">
            <span class="toggle-label">For you</span>
            <span class="toggle-desc">Home timeline recommendations</span>
          </span>
          <input type="checkbox" id="forYou" checked />
          <span class="switch" aria-hidden="true"></span>
        </label>

        <label class="toggle" for="following">
          <span class="toggle-copy">
            <span class="toggle-label">Following</span>
            <span class="toggle-desc">Posts from accounts you follow</span>
          </span>
          <input type="checkbox" id="following" checked />
          <span class="switch" aria-hidden="true"></span>
        </label>

        <label class="toggle" for="replies">
          <span class="toggle-copy">
            <span class="toggle-label">Replies</span>
            <span class="toggle-desc">Reply posts across X</span>
          </span>
          <input type="checkbox" id="replies" checked />
          <span class="switch" aria-hidden="true"></span>
        </label>
      </section>

      <p class="note">
        Reload X after changing settings if some posts do not update immediately.
      </p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
